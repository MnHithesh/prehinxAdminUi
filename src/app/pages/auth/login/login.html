<div class="min-h-screen bg-slate-100 flex items-center justify-center">
  <div class="w-[1000px] h-[600px] bg-white rounded-2xl shadow-2xl flex overflow-hidden">
    <!-- LEFT PANEL -->
    <div
      class="flex-1 bg-slate-100 flex flex-col items-center justify-center p-10 text-center bg-[#181b22]"
    >
      <img src="/apple-touch-icon-180x180.png" class="w-56 mb-8" alt="illustration" />
    </div>

    <!-- RIGHT PANEL -->
    <div class="flex-[1.2] p-16 flex flex-col justify-center">
      <h2 class="text-2xl font-semibold mb-2">Good morning,Welcome Back!</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-2"> Email address </label>

          <div class="relative">
            <input
              type="email"
              formControlName="email"
              placeholder="Enter your email address"
              class="w-full rounded-xl border border-gray-200 px-4 py-3 pl-10 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
            />
            <span class="absolute left-3 top-3.5 text-gray-400"> ✉️ </span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium mb-2"> Password </label>

          <div class="relative">
            <input
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="Enter your password"
              class="w-full rounded-xl border border-gray-200 px-4 py-3 pl-10 pr-10 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
            />

            <span class="absolute left-3 top-3.5 text-gray-400"> 🔒 </span>

            <button
              type="button"
              (click)="hidePassword = !hidePassword"
              class="absolute right-3 top-3 text-gray-400"
            >
              👁
            </button>
          </div>
        </div>

        <!-- Row -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2">
            <input type="checkbox" formControlName="rememberMe" class="accent-teal-500" />
            Remember me
          </label>

          <a class="underline cursor-pointer"> Forgot password? </a>
        </div>

        <!-- Button -->
        <button
          type="submit"
          [disabled]="loginForm.invalid || isSubmitting"
          class="w-full py-3 rounded-xl bg-[#181b22]/80 hover:bg-[#181b22] text-white font-medium transition disabled:opacity-50"
        >
          @if (!isSubmitting) {
            <span>Login</span>
          } @else {
            <span>Loading...</span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
